<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Register</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
    <h1 class="text-center">Learning Bootstrap</h1>
    <div class="container">
        <div class="row mt-4">
            <div class="col-md-4 shadow mx-auto p-3">
                <h2 class="text-center">Registration</h2>
                <form method="post" action="#">
                    <div class="mb-3">
                        <label for="input-1" class="form-label">Username</label>
                        <input type="text" class="form-control" id="input-1" placeholder="username">
                    </div>
                    <div class="mb-3">
                        <label for="input-2" class="form-label">Password</label>
                        <input type="password" class="form-control" id="input-2" placeholder="Password">
                    </div>
                    <div class="mb-3">
                        <label for="input-3" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="input-3" placeholder="Confirm Password">
                    </div>
                    <div class="mb-3">
                        <input type="submit" class="btn btn-success" id="input-4" value="Submit"> <br/>
                        Already User? <a href="login.html" class="anchor">Login</a>
                    </div>
                </form>
                <a href="home.html" class="anchor">Home</a>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="assets/js/bootstrap.bundle.min"></script>
</body>
</html>
